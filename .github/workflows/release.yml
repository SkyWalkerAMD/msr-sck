# SPDX-License-Identifier: GPL-2.0-only
name: release

on:
  push:
    branches: ["main"]          # 日常 push: 只跑 tests(其余 job 有 tag/dispatch 条件)
    tags: ["*"]                 # 打 tag: tests 通过后构建并发布
  pull_request:                 # PR: 只跑 tests,合并前就暴露问题
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"        # 每周一跑一次 tests:runner 环境漂移(镜像升级、locale
                                # 变化等)在无提交的静默期也能被发现,而不是攒到发版才炸

# 默认最小权限:tests 与构建只需 checkout(read)。
# 需要写 Release / gh-pages 的两个发布 job 在 job 级单独提权。
permissions:
  contents: read

# 分支/PR 维度:同一 ref 连续推送时取消上一条还在跑的(最新代码优先,省 runner);
# tag 维度:cancel-in-progress 对 tag 关闭,发布流水线绝不中途取消。
# 跨 tag 的 gh-pages 竞态由 apt-repo 的 job 级 concurrency 单独防护。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run regression suite
        run: sudo bash tests/run.sh

  build-deb:
    needs: tests
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # 编译放进老 glibc 容器(ubuntu:20.04, glibc 2.31) → deb 兼容 Ubuntu 20.04+ / Debian 11+。
      # 注意不能用 container: 让整个 job 进老容器——Actions 的 checkout/upload 现在跑 Node 24,
      # 要求 glibc >= 2.34,老容器里会直接失败;所以 action 留在宿主机,只有编译进容器。
      - name: build deb in ubuntu:20.04
        run: |
          docker run --rm -v "$PWD":/src -w /src -e DEBIAN_FRONTEND=noninteractive ubuntu:20.04 bash -ec '
            apt-get update
            apt-get install -y --no-install-recommends gcc libc6-dev
            bash packaging/build-deb.sh
          '

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"
          retention-days: 7     # 中间产物;正式资产随 Release 永久保存

  build-rpm:
    needs: tests
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # 一个发行版构建失败不取消其余:release 反正会因 needs 失败而不发布,
      # 但"只有 el8 挂"和"全挂"是完全不同的诊断信息,让四个都跑完。
      fail-fast: false
      matrix:
        include:
          - image: rockylinux:8
            label: el8
          - image: rockylinux:9
            label: el9
          # 官方 library 尚无 rockylinux:10,用 RESF 维护的命名空间镜像
          - image: rockylinux/rockylinux:10
            label: el10
          - image: fedora:latest
            label: fedora
    steps:
      - uses: actions/checkout@v4

      - name: build rpm in ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD":/src -w /src ${{ matrix.image }} bash -ec '
            dnf -y install rpm-build gcc make tar gzip
            V=$(sed -n "s/^Version:[[:space:]]*//p" packaging/sckoc.spec)
            mkdir -p /root/rpmbuild/SOURCES "/tmp/sckoc-$V"
            cp -r . "/tmp/sckoc-$V/"
            rm -rf "/tmp/sckoc-$V/.git"
            tar -C /tmp -czf "/root/rpmbuild/SOURCES/sckoc-$V.tar.gz" "sckoc-$V"
            rpmbuild -ba packaging/sckoc.spec
            # 只发布主包，debuginfo/debugsource 不上 Release
            cp /root/rpmbuild/RPMS/x86_64/sckoc-"$V"-*.rpm /src/
          '

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.label }}
          path: "*.rpm"
          retention-days: 7

  review-srpm:
    needs: tests
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # 复刻 packaging/make-review-srpm.sh 的容器配方:fedora + rpmautospec,
      # 对 fedora/sckoc.spec 做 rpmbuild -bs;%autorelease 在无 git 元数据时
      # 自动落到 Release 1(与 2.0.0 审核 SRPM 的生成方式一致)。
      # 注意:Source0 必须用 spectool 下载 GitHub 生成的原件 tarball,
      # 不能自行打包——否则内容相同但 gzip 字节不同,fedora-review 的
      # "Sources match upstream" 校验和会不一致(2.1.1 报告踩过此坑)。
      - name: build review SRPM (fedora spec)
        run: |
          docker run --rm -v "$PWD":/src -w /src fedora:latest bash -ec '
            dnf -y install rpm-build rpmdevtools rpmautospec
            V=$(sed -n "s/^Version:[[:space:]]*//p" fedora/sckoc.spec)
            mkdir -p /root/rpmbuild/SOURCES
            spectool -g -C /root/rpmbuild/SOURCES fedora/sckoc.spec
            rpmbuild -bs fedora/sckoc.spec
            cp /root/rpmbuild/SRPMS/sckoc-"$V"-*.src.rpm /src/
            cp fedora/sckoc.spec /src/sckoc.spec
          '

      - uses: actions/upload-artifact@v4
        with:
          name: review-srpm
          path: |
            *.src.rpm
            sckoc.spec
          retention-days: 7

  release:
    needs:
      - tests
      - build-deb
      - build-rpm
      - review-srpm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write           # 附加 Release 资产需要
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true

      - name: Get latest release tag
        id: get_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "未找到任何已有的 Release，手动运行失败。"
              exit 1
            fi
            echo "TAG_NAME=$LATEST_TAG" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          # 三类资产(deb/rpm/spec)都应存在;缺任何一类说明上游构建有问题,
          # 宁可让发布失败也不发一个缺资产的 Release。
          fail_on_unmatched_files: true
          files: |
            *.deb
            *.rpm
            sckoc.spec

  apt-repo:
    # 必须等 tests:apt 仓库是 force-push 覆盖发布,一旦发出没有"上一版"可回退,
    # 绝不能在测试失败时把坏包推给 apt 用户。
    needs:
      - tests
      - build-deb
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write           # push gh-pages 需要
    # 跨 tag 串行:workflow 级 concurrency 按 ref 分组,两个 tag 会并行,
    # 唯一共享的可变目标是 gh-pages 的 apt 目录,在这里单独排队。
    concurrency:
      group: apt-repo-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deb
          path: .

      - name: build apt repo
        run: bash packaging/make-apt-repo.sh

      - name: publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: false
